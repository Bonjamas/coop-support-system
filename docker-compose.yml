services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: coop
      POSTGRES_PASSWORD: coop123
      POSTGRES_DB: coop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coop"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: